name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: ./backEnd
        run: npm ci

      - name: Lint backend
        working-directory: ./backEnd
        run: npm run lint

      - name: Build backend
        working-directory: ./backEnd
        run: npm run build

      - name: Install frontend dependencies
        working-directory: ./frontEnd
        run: npm ci

      - name: Lint frontend
        working-directory: ./frontEnd
        run: npm run lint

      - name: Build frontend
        working-directory: ./frontEnd
        run: npm run build